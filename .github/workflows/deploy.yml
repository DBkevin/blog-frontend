name: Deploy Frontend

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
        env:
          VITE_API_BASE: http://120.25.70.117:40001/api/v1
      - name: Deploy dist to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 120.25.70.117
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: dist/
          target: /data/blog/frontend/
          strip_components: 0
      - name: Rebuild Docker container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 120.25.70.117
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /data/blog
            docker compose build blog-frontend --no-cache
            docker compose up -d blog-frontend
