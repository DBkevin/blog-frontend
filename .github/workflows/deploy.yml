name: Deploy Frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  VITE_API_BASE: ${{ vars.VITE_API_BASE || 'http://120.25.70.117:40001/api/v1' }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
      - name: Debug API token
        run: |
          echo "Step 1: whoami"
          npx --yes wrangler whoami 2>&1 || echo "EXIT_CODE=$?"
          echo ""
          echo "Step 2: deploy"
          npx --yes wrangler pages deploy dist --project-name=blog-frontend --branch=main 2>&1 || echo "EXIT_CODE=$?"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
